name: Deploy to Staging

on:
  workflow_dispatch:
  workflow_run:
    workflows: ['CI']
    branches: [main]
    types: [completed]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# OIDC token permissions for Azure login
permissions:
  id-token: write
  contents: read

# All environment-specific values come from GitHub secrets/variables.
# No hardcoded Azure resource names in this file.
# See .private/azure-staging.md for real values (gitignored).

jobs:
  deploy:
    name: Deploy to Azure Staging
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    environment: staging

    env:
      ACR_SERVER: ${{ vars.ACR_SERVER }}
      RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}
      CONTAINER_APP_NAME: ${{ vars.CONTAINER_APP_NAME }}
      APP_URL: ${{ vars.APP_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.ACR_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push web image
        run: |
          docker build -t $ACR_SERVER/vaultspace-web:${{ github.sha }} -t $ACR_SERVER/vaultspace-web:latest -f Dockerfile .
          docker push $ACR_SERVER/vaultspace-web:${{ github.sha }}
          docker push $ACR_SERVER/vaultspace-web:latest

      - name: Build and push worker image
        run: |
          docker build -t $ACR_SERVER/vaultspace-worker:${{ github.sha }} -t $ACR_SERVER/vaultspace-worker:latest -f Dockerfile.worker .
          docker push $ACR_SERVER/vaultspace-worker:${{ github.sha }}
          docker push $ACR_SERVER/vaultspace-worker:latest

      - name: Setup Node.js for migrations
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies and run migrations
        run: |
          npm ci
          npx prisma generate
          npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Update Container App - Web
        run: |
          az containerapp update \
            --name $CONTAINER_APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --container-name ca-vaultspace-web \
            --image $ACR_SERVER/vaultspace-web:${{ github.sha }}

      - name: Update Container App - Worker
        run: |
          az containerapp update \
            --name ca-vaultspace-worker \
            --resource-group $RESOURCE_GROUP \
            --container-name ca-vaultspace-worker \
            --image $ACR_SERVER/vaultspace-worker:${{ github.sha }}

      - name: Validate Container App env shape
        run: |
          chmod +x scripts/validate-container-env.sh
          scripts/validate-container-env.sh "$RESOURCE_GROUP" ca-vaultspace-web ca-vaultspace-worker

      - name: Health check with deployment mode validation
        run: |
          # Configuration
          MAX_ATTEMPTS=10
          INITIAL_WAIT=15
          RETRY_INTERVAL=15

          echo "=== Deployment Health Check ==="
          echo "Max attempts: $MAX_ATTEMPTS"
          echo "Initial wait: ${INITIAL_WAIT}s"
          echo "Retry interval: ${RETRY_INTERVAL}s"
          echo ""

          # Get container app revision info for diagnostics
          echo "=== Container App Diagnostics ==="
          REVISION_INFO=$(az containerapp revision list \
            --name $CONTAINER_APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --query "[0].{name:name, active:properties.active, replicas:properties.replicas, createdTime:properties.createdTime, runningState:properties.runningState}" \
            -o json 2>/dev/null || echo '{}')
          echo "Latest revision: $REVISION_INFO"
          echo ""

          echo "Waiting ${INITIAL_WAIT}s for deployment to initialize..."
          sleep $INITIAL_WAIT

          # Retry loop for health check with deployment mode validation
          ATTEMPT=1
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo ""
            echo "=== Attempt $ATTEMPT of $MAX_ATTEMPTS ==="

            # Basic health check
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$APP_URL/api/health" 2>/dev/null || echo "000")
            echo "HTTP status: $HTTP_CODE"

            if [ "$HTTP_CODE" != "200" ]; then
              echo "Health endpoint not ready (HTTP $HTTP_CODE)"
              if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
                echo "Retrying in ${RETRY_INTERVAL}s..."
                sleep $RETRY_INTERVAL
                ATTEMPT=$((ATTEMPT + 1))
                continue
              else
                echo "ERROR: Health check failed after $MAX_ATTEMPTS attempts"
                exit 1
              fi
            fi

            # Fetch full health response
            HEALTH_RESPONSE=$(curl -s --max-time 10 "$APP_URL/api/health" 2>/dev/null || echo '{}')
            echo "Health response: $HEALTH_RESPONSE"

            # Validate deployment mode
            DEPLOY_MODE=$(echo "$HEALTH_RESPONSE" | jq -r '.mode // "unknown"')
            echo "Deployment mode: $DEPLOY_MODE"

            if [ "$DEPLOY_MODE" = "unknown" ]; then
              echo "New container not yet active (mode field missing)"
              if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
                echo "Retrying in ${RETRY_INTERVAL}s..."
                sleep $RETRY_INTERVAL
                ATTEMPT=$((ATTEMPT + 1))
                continue
              else
                echo "ERROR: New container did not become active after $MAX_ATTEMPTS attempts"
                # Show final revision state for debugging
                az containerapp revision list \
                  --name $CONTAINER_APP_NAME \
                  --resource-group $RESOURCE_GROUP \
                  --query "[].{name:name, active:properties.active, replicas:properties.replicas, runningState:properties.runningState}" \
                  -o table 2>/dev/null || true
                exit 1
              fi
            fi

            if [ "$DEPLOY_MODE" != "azure" ]; then
              echo "ERROR: Expected deployment mode 'azure', got '$DEPLOY_MODE'"
              exit 1
            fi
            echo "✓ Deployment mode verified: $DEPLOY_MODE"

            # Verify critical Azure capabilities
            CAN_QUEUE=$(echo "$HEALTH_RESPONSE" | jq -r '.capabilities.canQueueJobs // false')
            CAN_CACHE=$(echo "$HEALTH_RESPONSE" | jq -r '.capabilities.canUseDistributedCache // false')

            if [ "$CAN_QUEUE" != "true" ]; then
              echo "ERROR: Job queue capability unavailable in Azure mode"
              exit 1
            fi
            echo "✓ Job queue capability verified"

            if [ "$CAN_CACHE" != "true" ]; then
              echo "ERROR: Distributed cache capability unavailable in Azure mode"
              exit 1
            fi
            echo "✓ Distributed cache capability verified"

            # Check for degraded capabilities (warning, not failure)
            DEGRADED=$(echo "$HEALTH_RESPONSE" | jq -r '.degraded // []')
            if [ "$DEGRADED" != "[]" ]; then
              echo "⚠ Some capabilities are degraded: $DEGRADED"
            else
              echo "✓ All capabilities available"
            fi

            echo ""
            echo "=== Health Check Passed (attempt $ATTEMPT) ==="
            exit 0
          done

      - name: Post deployment summary
        run: |
          # Fetch capabilities for summary
          HEALTH_RESPONSE=$(curl -s "$APP_URL/api/health" || echo '{}')
          DEPLOY_MODE=$(echo "$HEALTH_RESPONSE" | jq -r '.mode // "unknown"')
          DEGRADED=$(echo "$HEALTH_RESPONSE" | jq -r '.degraded | length // 0')

          echo "## Staging Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Info" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** $ACR_SERVER/vaultspace-web:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** $APP_URL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployment Mode" >> $GITHUB_STEP_SUMMARY
          echo "- **Mode:** $DEPLOY_MODE" >> $GITHUB_STEP_SUMMARY
          echo "- **Degraded Capabilities:** $DEGRADED" >> $GITHUB_STEP_SUMMARY
          echo "- **Health:** ✓ Verified" >> $GITHUB_STEP_SUMMARY
