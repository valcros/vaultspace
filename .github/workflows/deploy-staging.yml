name: Deploy to Staging

on:
  workflow_dispatch:
  workflow_run:
    workflows: ['CI']
    branches: [main]
    types: [completed]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# OIDC token permissions for Azure login
permissions:
  id-token: write
  contents: read

# All environment-specific values come from GitHub secrets/variables.
# No hardcoded Azure resource names in this file.
# See .private/azure-staging.md for real values (gitignored).

jobs:
  deploy:
    name: Deploy to Azure Staging
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    environment: staging

    env:
      ACR_SERVER: ${{ vars.ACR_SERVER }}
      RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}
      CONTAINER_APP_NAME: ${{ vars.CONTAINER_APP_NAME }}
      APP_URL: ${{ vars.APP_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.ACR_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push web image
        run: |
          docker build -t $ACR_SERVER/vaultspace-web:${{ github.sha }} -t $ACR_SERVER/vaultspace-web:latest -f Dockerfile .
          docker push $ACR_SERVER/vaultspace-web:${{ github.sha }}
          docker push $ACR_SERVER/vaultspace-web:latest

      - name: Build and push worker image
        run: |
          docker build -t $ACR_SERVER/vaultspace-worker:${{ github.sha }} -t $ACR_SERVER/vaultspace-worker:latest -f Dockerfile.worker .
          docker push $ACR_SERVER/vaultspace-worker:${{ github.sha }}
          docker push $ACR_SERVER/vaultspace-worker:latest

      - name: Setup Node.js for migrations
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies and run migrations
        run: |
          npm ci
          npx prisma generate
          npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Update Container App - Web
        run: |
          az containerapp update \
            --name $CONTAINER_APP_NAME \
            --resource-group $RESOURCE_GROUP \
            --container-name ca-vaultspace-web \
            --image $ACR_SERVER/vaultspace-web:${{ github.sha }}

      - name: Update Container App - Worker
        run: |
          az containerapp update \
            --name ca-vaultspace-worker \
            --resource-group $RESOURCE_GROUP \
            --container-name ca-vaultspace-worker \
            --image $ACR_SERVER/vaultspace-worker:${{ github.sha }}

      - name: Health check
        run: |
          echo "Waiting for deployment to stabilize..."
          sleep 30
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL/api/health")
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Health check failed with status $HTTP_CODE"
            exit 1
          fi
          echo "Health check passed (HTTP $HTTP_CODE)"

      - name: Post deployment summary
        run: |
          echo "## Staging Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** $ACR_SERVER/vaultspace-web:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** $APP_URL" >> $GITHUB_STEP_SUMMARY
          echo "- **Health:** Verified" >> $GITHUB_STEP_SUMMARY
