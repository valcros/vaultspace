name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs so rapid pushes don't pile up on the runner pool.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint -- --max-warnings 25

      - name: Run Prettier check
        run: npm run format:check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run TypeScript compiler
        run: npm run type-check

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Run tests
        run: npm run test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379
          SESSION_SECRET: test-secret-for-ci

  rls-integration:
    name: RLS Integration (SEC-005)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL_ADMIN: postgresql://test:test@127.0.0.1:5432/test
      DATABASE_URL: postgresql://vaultspace_app:vaultspace_app@127.0.0.1:5432/test
      DEPLOYMENT_MODE: standalone
      ENABLE_RLS: true
      SESSION_SECRET: test-secret-for-ci
      ALLOW_RLS_TEST_DB_SETUP: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ env.DATABASE_URL_ADMIN }}

      - name: Apply RLS policies and app role
        run: npm run db:setup:rls-test

      - name: Run RLS integration tests
        run: npm run test:integration:rls

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, rls-integration]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build application
        run: npm run build

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check dependency vulnerabilities
        run: |
          AUDIT_JSON=$(npm audit --json 2>/dev/null || true)
          RESULT=$(printf '%s' "$AUDIT_JSON" | node -e "
            const data = require('fs').readFileSync('/dev/stdin', 'utf8').trim();
            const audit = data ? JSON.parse(data) : {};
            const critical = audit.metadata?.vulnerabilities?.critical || 0;
            const high = audit.metadata?.vulnerabilities?.high || 0;
            console.log(JSON.stringify({ critical, high }));
          " 2>/dev/null || echo '{"critical":0,"high":0}')
          echo "Vulnerability summary: $RESULT"
          CRITICAL=$(printf '%s' "$RESULT" | node -e "
            const data = require('fs').readFileSync('/dev/stdin', 'utf8');
            console.log(JSON.parse(data).critical || 0);
          ")
          if [ "$CRITICAL" -gt 0 ]; then
            echo "Critical vulnerabilities found. Failing CI."
            exit 1
          fi

  # Test deployment mode system in both modes
  deployment-mode-tests:
    name: Deployment Mode Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        mode: [azure, standalone]
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run deployment mode tests (${{ matrix.mode }})
        run: npm run test -- --reporter=verbose src/lib/deployment-mode.test.ts src/lib/deployment-capabilities.test.ts src/lib/azure-guard.test.ts
        env:
          DEPLOYMENT_MODE: ${{ matrix.mode }}
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379
          SESSION_SECRET: test-secret-for-ci

      - name: Verify mode detection
        run: |
          npx tsx -e "
            import { getDeploymentMode } from './src/lib/deployment-mode';
            const mode = getDeploymentMode();
            if (mode !== '${{ matrix.mode }}') {
              console.error('Mode mismatch: expected ${{ matrix.mode }}, got', mode);
              process.exit(1);
            }
            console.log('✓ Deployment mode correctly detected:', mode);
          "
        env:
          DEPLOYMENT_MODE: ${{ matrix.mode }}

  # PR-only Docker build validation (no push). On main, the build-and-push job
  # below produces the deployable images instead, so we don't build twice.
  # Standalone-mode image builds are covered by standalone-validation.yml.
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build, deployment-mode-tests]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build app image (Azure mode)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: vaultspace-app:test
          build-args: |
            DEPLOYMENT_MODE=azure
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build worker image (Azure mode)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.worker
          push: false
          tags: vaultspace-worker:test
          build-args: |
            DEPLOYMENT_MODE=azure
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Main-only: build the deployable web + worker images ONCE and push them to
  # ACR tagged by commit SHA. The Deploy workflow then just points the Container
  # Apps at these tags (no rebuild). If this job fails the deploy never runs, so
  # staging stays on the current revision (fail-safe).
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [build, deployment-mode-tests]
    if: github.event_name == 'push'
    environment: staging
    permissions:
      id-token: write
      contents: read
    env:
      ACR_SERVER: ${{ vars.ACR_SERVER }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.ACR_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.ACR_SERVER }}/vaultspace-web:${{ github.sha }}
            ${{ env.ACR_SERVER }}/vaultspace-web:latest
          build-args: |
            DEPLOYMENT_MODE=azure
            APP_RELEASE=${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.worker
          push: true
          tags: |
            ${{ env.ACR_SERVER }}/vaultspace-worker:${{ github.sha }}
            ${{ env.ACR_SERVER }}/vaultspace-worker:latest
          build-args: |
            DEPLOYMENT_MODE=azure
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

  e2e:
    name: E2E (a11y + security)
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/test
      REDIS_URL: redis://localhost:6379
      SESSION_SECRET: e2e-ci-test-secret-32-chars-long!
      DEPLOYMENT_MODE: standalone
      STORAGE_PROVIDER: local
      STORAGE_LOCAL_PATH: ./storage
      APP_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      PLAYWRIGHT_BASE_URL: http://localhost:3000
      PLAYWRIGHT_ADMIN_EMAIL: admin@demo.vaultspace.app
      PLAYWRIGHT_ADMIN_PASSWORD: Demo123!
      # Override the dev command to avoid hot-reload overhead in CI
      PLAYWRIGHT_WEB_SERVER_COMMAND: npm run dev:standalone

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Seed database with demo data
        run: npx prisma db seed

      - name: Install Playwright browsers
        run: npx playwright install chromium firefox --with-deps

      - name: Run E2E tests
        run: npx playwright test tests/e2e/a11y.test.ts tests/e2e/security.test.ts tests/e2e/room-interactions.test.ts
        timeout-minutes: 12

      - name: Upload Playwright report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
